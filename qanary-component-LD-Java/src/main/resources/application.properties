# --- component identity (required by QanaryComponentConfiguration) ---
spring.application.name=${SERVICE_NAME_COMPONENT:LD-Java}
spring.application.description=${SERVICE_DESCRIPTION_COMPONENT:Detects the question language (Java example component)}
server.port=${SERVER_PORT:40123}
server.host=${SERVER_HOST:http://localhost}

# --- registration with the Qanary pipeline (Spring Boot Admin) ---
spring.boot.admin.url=${SPRING_BOOT_ADMIN_URL:http://localhost:40111}
spring.boot.admin.client.url=${SPRING_BOOT_ADMIN_URL:http://localhost:40111}
spring.boot.admin.client.username=${SPRING_BOOT_ADMIN_USERNAME:admin}
spring.boot.admin.client.password=${SPRING_BOOT_ADMIN_PASSWORD:admin}
# advertise the URL the pipeline should call back on (host networking)
spring.boot.admin.client.instance.service-base-url=${SERVER_HOST:http://localhost}:${SERVER_PORT:40123}
spring.boot.admin.client.instance.management-base-url=${SERVER_HOST:http://localhost}:${SERVER_PORT:40123}

# --- expose actuator health so the pipeline can poll the component ---
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
