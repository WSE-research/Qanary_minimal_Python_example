name: End-to-end tests (offline)

# Validates the whole pipeline (LD-Java + Python components + local Wikidata
# subset) against predefined questions and their expected answers. Runs the
# repo's own run-e2e-tests.sh, the same script developers use locally for an
# offline E2E test.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run the offline end-to-end tests
        run: bash run-e2e-tests.sh
