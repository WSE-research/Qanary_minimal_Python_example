services:
  virtuoso:
    image: wseresearch/qanary-virtuoso:latest
    container_name: "Virtuoso-Triplestore"
    network_mode: host # usage of ports also possible
    env_file:
      - ./Virtuoso-triplestore/.env # use .env file for environment variables
  wikidata-dataset: # local Wikidata mirror so the test question can be answered offline (no public WDQS)
    image: wseresearch/qanary-virtuoso:latest
    container_name: "Wikidata-Dataset"
    network_mode: host # runs on ports 1112/8891 (see ./Wikidata-dataset/.env)
    env_file:
      - ./Wikidata-dataset/.env
  wikidata-dataset-loader: # loads the Wikidata subset (ttl) on demand once the dataset Virtuoso is up
    image: curlimages/curl:latest
    container_name: "Wikidata-Dataset-Loader"
    depends_on:
      - wikidata-dataset
    network_mode: host
    restart: "no"
    volumes:
      - ./Wikidata-dataset/wikidata-subset.ttl:/data/wikidata-subset.ttl:ro
      - ./Wikidata-dataset/load.sh:/load.sh:ro
    entrypoint: ["sh", "/load.sh"]
  qanary-pipeline:
    depends_on:
      - virtuoso
    environment: # set environment variables for the pipeline
      - SPRING_BOOT_ADMIN_URL=http://0.0.0.0:40111
      - SPRING_BOOT_ADMIN_USERNAME=admin
      - SPRING_BOOT_ADMIN_PASSWORD=admin
      - SERVER_HOST=http://0.0.0.0
      - SERVER_PORT=40111
      - SERVICE_NAME_COMPONENT=Qanary-Pipeline
      - SERVICE_DESCRIPTION_COMPONENT=Qanary-Pipeline
      - VIRTUOSO_URL=jdbc:virtuoso://127.0.0.1:1111
      - VIRTUOSO_USERNAME=rw
      - VIRTUOSO_PASSWORD=rw
      - REST_TEMPLATE_SETTING=logging
    ports:
      - 40111:40111
    image: qanary/qanary-pipeline:latest # use Dockerhub image
    container_name: "Qanary-Pipeline"
    network_mode: host # usage of ports also possible
    # retry if Virtuoso's ISQL port (1111) isn't accepting connections yet at startup
    restart: on-failure
  qanary-component-nel-python-wikidata-lookup: # for building from source
    depends_on:
      qanary-pipeline:
        condition: service_started
    environment:
      - SERVER_HOST=http://localhost
      - SERVER_PORT=40120
    build:
      context: ./Qanary-Component-NEL-WikidataLookup
      dockerfile: Dockerfile
    env_file:
      - ./Qanary-Component-NEL-WikidataLookup/.env
    container_name: "NEL-Wikidata-Lookup"
    network_mode: host # usage of ports also possible
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:40120/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  qanary-component-qb-wikidata: # for building from source
    depends_on:
      qanary-pipeline:
        condition: service_started
    environment:
      - SERVER_HOST=http://localhost
      - SERVER_PORT=40121
    build:
      context: ./Qanary-Component-QueryBuilder-Wikidata
      dockerfile: Dockerfile
    env_file:
      - ./Qanary-Component-QueryBuilder-Wikidata/.env
    container_name: "QB-Wikidata"
    network_mode: host # usage of ports also possible
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:40121/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  qanary-component-qe-sparqlexecuter: # this component was already created by someone and pushed to dockerhub
    depends_on:
      qanary-pipeline:
        condition: service_started
    environment:
      - SERVER_HOST=http://localhost
      - SERVER_PORT=40122
    build:
      context: ./Qanary-Component-QE-SparqlExecuter
      dockerfile: Dockerfile
    network_mode: host # or use ports
    container_name: "QE-SparqlExecuter"
    env_file:
      - ./Qanary-Component-QE-SparqlExecuter/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:40122/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
  # --- Java component (built from source; run ./build.sh to build the jar first) ---
  qanary-component-ld-java:
    depends_on:
      qanary-pipeline:
        condition: service_started
    environment:
      - SERVER_HOST=http://localhost
      - SERVER_PORT=40123
      - SPRING_BOOT_ADMIN_URL=http://localhost:40111
      - SPRING_BOOT_ADMIN_USERNAME=admin
      - SPRING_BOOT_ADMIN_PASSWORD=admin
      - SERVICE_NAME_COMPONENT=LD-Java
      - SERVICE_DESCRIPTION_COMPONENT=Detects the question language (Java example component)
    build:
      context: ./qanary-component-LD-Java
      dockerfile: Dockerfile
    container_name: "LD-Java"
    network_mode: host # usage of ports also possible
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:40123/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
